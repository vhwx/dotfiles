"$schema" = 'https://starship.rs/config-schema.json'

# Requires a Nerd Font (Hack Nerd Font installed by install.sh / setup.sh)

# Two-line prompt: OS icon + user@host + path + git info + language context, then ❯
# Right side: timestamp
format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_state\
$nodejs\
$python\
$rust\
$golang\
$docker_context\
$cmd_duration
$character"""

right_format = "$time"

# -- OS icon ------------------------------------------------------------------
[os]
disabled = false
style = "bold blue"

[os.symbols]
Linux  = "🐧"
Macos  = " "
Ubuntu = " "

# -- Username -----------------------------------------------------------------
[username]
show_always = true
style_user  = "bold green"
style_root  = "bold red"
format      = "[$user]($style) "

# -- Hostname -----------------------------------------------------------------
[hostname]
ssh_only   = false
ssh_symbol = "⚡ "
style      = "bold yellow"
format     = "[@ $ssh_symbol$hostname]($style) "

# -- Directory ----------------------------------------------------------------
[directory]
style            = "bold cyan"
truncation_length = 4
truncation_symbol = "…/"
truncate_to_repo  = true
read_only         = " 󰌾"

# -- Git branch ---------------------------------------------------------------
[git_branch]
symbol = " "
style  = "bold purple"
format = "[$symbol$branch]($style) "

# -- Git status ---------------------------------------------------------------
[git_status]
style     = "bold red"
ahead     = "⇡${count}"
behind    = "⇣${count}"
diverged  = "⇕⇡${ahead_count}⇣${behind_count}"
staged    = "[+${count}](bold green)"
modified  = "[~${count}](bold yellow)"
deleted   = "[-${count}](bold red)"
untracked = "[?${count}](dimmed white)"
conflicted = "⚡"
format    = '([$all_status$ahead_behind]($style) )'

# -- Git state (rebase / merge / cherry-pick …) --------------------------------
[git_state]
style  = "bold yellow"
format = '\([$state( $progress_current/$progress_total)]($style)\) '

# -- Language contexts --------------------------------------------------------
[nodejs]
symbol       = " "
detect_files = ["package.json", ".nvmrc"]

[python]
symbol       = " "
detect_files = ["requirements.txt", "pyproject.toml", ".python-version", "Pipfile"]

[rust]
symbol = " "

[golang]
symbol = " "

[docker_context]
symbol = " "
format = "via [$symbol$context]($style) "

# -- Command duration ---------------------------------------------------------
# Only shown when a command takes longer than 2 seconds.
[cmd_duration]
min_time           = 2000
style              = "bold yellow"
format             = "took [$duration]($style) "
show_notifications = false

# -- Prompt character ---------------------------------------------------------
[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold green)"

# -- Right-side timestamp -----------------------------------------------------
[time]
disabled    = false
time_format = "%H:%M:%S"
style       = "dimmed white"
format      = "[$time]($style)"
