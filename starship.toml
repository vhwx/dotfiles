# Starship prompt — balanced config
# https://starship.rs/config/
# Requires a Nerd Font (Hack Nerd Font is installed by install.sh)

"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os\
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$rust\
$golang\
$docker_context\
$cmd_duration\
$line_break\
$character\
"""

right_format = "$time"

[os]
disabled = false
style = "bold blue"

[os.symbols]
Linux = "🐧"
Macos = " "
Ubuntu = " "

[directory]
style = "bold cyan"
truncation_length = 4
truncation_symbol = "…/"
read_only = " 󰌾"

[git_branch]
symbol = " "
style = "bold purple"
format = "on [$symbol$branch(:$remote_branch)]($style) "

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold red"
conflicted = "⚡"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[nodejs]
symbol = " "
detect_files = ["package.json", ".nvmrc"]

[python]
symbol = " "
detect_files = ["requirements.txt", "pyproject.toml", ".python-version", "Pipfile"]

[rust]
symbol = " "

[golang]
symbol = " "

[docker_context]
symbol = " "
format = "via [$symbol$context]($style) "

[cmd_duration]
min_time = 2_000
format = "took [$duration](bold yellow) "
show_notifications = false

[time]
disabled = false
format = "[$time](dimmed white)"
time_format = "%H:%M"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"
